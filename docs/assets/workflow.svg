<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="280" viewBox="0 0 1100 280" role="img" aria-label="ApkSleuth workflow">
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1100" height="280" rx="26" fill="#0f172a"/>
  <text x="50" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">Analysis workflow</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(50 92)">
      <rect width="190" height="116" rx="20" fill="url(#box)" stroke="#334155"/>
      <text x="95" y="42" text-anchor="middle" font-size="20" font-weight="800" fill="#e5e7eb">APK input</text>
      <text x="95" y="76" text-anchor="middle" font-size="14" fill="#94a3b8">file upload</text>
      <text x="95" y="98" text-anchor="middle" font-size="14" fill="#94a3b8">local path</text>
    </g>
    <line x1="255" y1="150" x2="335" y2="150" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(350 92)">
      <rect width="190" height="116" rx="20" fill="url(#box)" stroke="#334155"/>
      <text x="95" y="42" text-anchor="middle" font-size="20" font-weight="800" fill="#e5e7eb">Static scan</text>
      <text x="95" y="76" text-anchor="middle" font-size="14" fill="#94a3b8">manifest</text>
      <text x="95" y="98" text-anchor="middle" font-size="14" fill="#94a3b8">strings / certs</text>
    </g>
    <line x1="555" y1="150" x2="635" y2="150" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(650 92)">
      <rect width="190" height="116" rx="20" fill="url(#box)" stroke="#334155"/>
      <text x="95" y="42" text-anchor="middle" font-size="20" font-weight="800" fill="#e5e7eb">Risk engine</text>
      <text x="95" y="76" text-anchor="middle" font-size="14" fill="#94a3b8">findings</text>
      <text x="95" y="98" text-anchor="middle" font-size="14" fill="#94a3b8">recommendations</text>
    </g>
    <line x1="855" y1="150" x2="935" y2="150" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(950 92)">
      <rect width="100" height="116" rx="20" fill="url(#box)" stroke="#334155"/>
      <text x="50" y="42" text-anchor="middle" font-size="20" font-weight="800" fill="#e5e7eb">Report</text>
      <text x="50" y="76" text-anchor="middle" font-size="14" fill="#94a3b8">HTML</text>
      <text x="50" y="98" text-anchor="middle" font-size="14" fill="#94a3b8">JSON</text>
    </g>
  </g>
</svg>
