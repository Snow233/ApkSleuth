<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="ApkSleuth project hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="80" r="170" fill="#38bdf8" opacity="0.12"/>
  <circle cx="160" cy="360" r="210" fill="#22c55e" opacity="0.09"/>
  <path d="M0 318 C190 265 280 390 470 318 S780 232 1200 300 V420 H0 Z" fill="#38bdf8" opacity="0.06"/>
  <g filter="url(#shadow)">
    <rect x="78" y="72" width="322" height="276" rx="28" fill="#020617" opacity="0.84" stroke="#334155"/>
    <rect x="108" y="104" width="262" height="42" rx="12" fill="#111827" stroke="#1e293b"/>
    <circle cx="133" cy="125" r="7" fill="#ef4444"/>
    <circle cx="156" cy="125" r="7" fill="#f59e0b"/>
    <circle cx="179" cy="125" r="7" fill="#22c55e"/>
    <text x="112" y="190" font-family="Consolas, monospace" font-size="22" fill="#bae6fd">$ apksleuth scan app.apk</text>
    <text x="112" y="230" font-family="Consolas, monospace" font-size="20" fill="#e5e7eb">high: 3  medium: 12</text>
    <text x="112" y="266" font-family="Consolas, monospace" font-size="20" fill="#e5e7eb">exported: 8</text>
    <text x="112" y="302" font-family="Consolas, monospace" font-size="20" fill="#e5e7eb">http urls: 0</text>
  </g>
  <g transform="translate(468 78)">
    <text x="0" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">ApkSleuth</text>
    <text x="0" y="96" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Local-first Android APK static analysis</text>
    <text x="0" y="136" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#94a3b8">CLI + Web UI for security triage, reverse learning, and app risk review.</text>
    <g transform="translate(0 182)">
      <rect width="146" height="42" rx="21" fill="url(#accent)"/>
      <text x="73" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#082f49">No Uploads</text>
      <rect x="162" width="154" height="42" rx="21" fill="#111827" stroke="#334155"/>
      <text x="239" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#e5e7eb">Risk Reports</text>
      <rect x="332" width="164" height="42" rx="21" fill="#111827" stroke="#334155"/>
      <text x="414" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#e5e7eb">Batch + Diff</text>
    </g>
    <g transform="translate(0 262)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#e5e7eb">
      <text x="0" y="0">Manifest security checks</text>
      <text x="290" y="0">Exported components</text>
      <text x="570" y="0">Secrets and URLs</text>
      <text x="0" y="42">SDK fingerprints</text>
      <text x="290" y="42">Native libraries</text>
      <text x="570" y="42">HTML reports</text>
    </g>
  </g>
